<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>To-Do-List</title>
        <link rel="stylesheet" href="style.css">
        <link rel="icon" href="assets/icon.png">
        <link rel="stylesheet" href="responsive.css">
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    </head>
    <body>
        <div class="containers container">
            <div class="box container">
                <h1>To-Do List</h1>
            <input id="input" placeholder="Type here..." maxlength="100"><div class="line"></div>
            <button id="add" class="btn btn-outline-primary" onclick="plus()">Add</button>
            <ul id="data">
                <li>
                To create  your To-Do list and face your tasks <button id="del" onclick="Delete(event)" style="margin-left:10px;">Delete</button>
                </li>
            </ul>
            </div>
        </div>

 <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
    <script>
    let ul=document.getElementById("data");
    let input=document.getElementById("input");

    function plus(){
      if(input.value.trim() === "") return;
      let listitem=document.createElement("li");
      let btn1= document.createElement("button");
      let btn2= document.createElement("button");
      btn1.innerText="Delete"
      btn1.id="del"
      btn1.onclick = Delete;
      listitem.innerText = input.value + ""
      listitem.appendChild(btn1);
      ul.appendChild(listitem);
      btn2.innerText="Completed"
      btn2.id="com"
      listitem.appendChild(btn2);
      ul.appendChild(listitem);
      btn2.onclick=Com;
      function Com(){
        listitem.style.background="lightgreen";
        listitem.style.borderLeft="4px solid green";
        btn1.textContent="Remove";
        btn1.style.background="red"
        btn1.style.color="white"
        btn1.onclick.remove();
}
      input.value = "";



    }
    function Delete(event){
    event.target.parentElement.remove()
   
    
   }

    </script>

    </body>
</html>
